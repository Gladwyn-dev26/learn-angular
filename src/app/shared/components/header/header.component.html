<mat-toolbar color="primary">
  <!-- App title -->
  <span class="app-title">Angular Learning App</span>

  <!-- Spacer pushes items to the right -->
  <span class="spacer"></span>

  <!-- Navigation buttons -->
  <button mat-button routerLink="/learn-angular"   routerLinkActive="active">Learn Angular</button>
  <button mat-button routerLink="/practice"   routerLinkActive="active">Practice</button>
  <button mat-button routerLink="/architecture"   routerLinkActive="active">Architecture</button>
  <button mat-button routerLink="/interview"  routerLinkActive="active">Interview Qs</button>

  <!-- Profile icon -->
  <button mat-icon-button aria-label="User profile">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>
