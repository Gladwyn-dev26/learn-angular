<mat-toolbar color="primary">

  <!-- App title -->
  <span class="app-title">Angular Learning App</span>

  <span class="spacer"></span>

  <!-- Navigation buttons -->
  <button
    mat-button
    routerLink="/learn-angular"
    routerLinkActive="active"
    (click)="selectMenu('Learn Angular')">
    Learn Angular
  </button>

  <button
    mat-button
    routerLink="/practice"
    routerLinkActive="active">
    Practice
  </button>

  <button
    mat-button
    routerLink="/architecture"
    routerLinkActive="active"
    (click)="selectMenu('Architecture')">
    Architecture
  </button>

  <button
    mat-button
    routerLink="/interview"
    routerLinkActive="active">
    Interview Qs
  </button>

  <!-- Profile icon -->
  <button mat-icon-button aria-label="User profile">
    <mat-icon>account_circle</mat-icon>
  </button>

</mat-toolbar>
